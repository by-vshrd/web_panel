{% extends 'base.html' %}
{% block title %}Настройки по умолчанию{% endblock %}
{% block content %}
<h2>Настройки по умолчанию для новых профилей</h2>
<div class="card">
    <form method="post">
        {% csrf_token %}
        <label>Длительность подписки (дней):</label>
        <input type="number" name="default_days" value="{{ settings.default_days }}" min="1">
        <label>Лимит трафика (ГБ, 0 – безлимит):</label>
        <input type="number" name="default_traffic_gb" value="{{ settings.default_traffic_gb }}" min="0">

        <hr style="margin: 1.5rem 0;">

        <label>Текст в футере сайта:</label>
        <input type="text" name="footer_text" value="{{ settings.footer_text }}" maxlength="200" style="margin-bottom:1rem;">

        <label>QR‑код оплаты (загрузите изображение):</label>
    {% if settings.payment_qr %}
        <img src="{{ settings.payment_qr.url }}" style="max-width:200px; border-radius:8px; margin-bottom:0.5rem;"><br>
    {% endif %}
    <input type="file" name="payment_qr" accept="image/*">
        
        <label>Ссылка для оплаты:</label>
        <input type="url" name="payment_link" value="{{ settings.payment_link }}">
<label>Реквизиты для перевода:</label>
<textarea name="bank_details" rows="5" style="width:100%; background:var(--bg); border:1px solid var(--border); border-radius:6px; padding:0.8rem; color:var(--text);">{{ settings.bank_details }}</textarea>
        <button type="submit" class="btn">Сохранить</button>
    </form>
</div>
{% endblock %}
