{% extends 'base.html' %}
{% block title %}Настройки по умолчанию{% endblock %}
{% block content %}
<h2>Настройки по умолчанию для новых профилей</h2>
<div class="card">
    <form method="post">
        {% csrf_token %}
        <label>Длительность подписки (дней):</label>
        <input type="number" name="default_days" value="{{ settings.default_days }}" min="1">
        <label>Лимит трафика (ГБ, 0 – безлимит):</label>
        <input type="number" name="default_traffic_gb" value="{{ settings.default_traffic_gb }}" min="0">
        <button type="submit" class="btn">Сохранить</button>
    </form>
</div>
{% endblock %}
