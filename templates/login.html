{% extends 'base.html' %}
{% block title %}Вход{% endblock %}
{% block content %}
<div class="card">
    <h2>Вход</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn" style="margin-top: 0.5rem; width:100%;">Войти</button>
    </form>
</div>

<script>
(function() {
    document.querySelectorAll('input[type="password"]').forEach(input => {
        const wrapper = document.createElement('div');
        wrapper.style.position = 'relative';
        input.parentNode.insertBefore(wrapper, input);
        wrapper.appendChild(input);

        const icon = document.createElement('span');
        icon.textContent = '👁️';
        icon.style.cssText = 'position:absolute; right:8px; top:8px; cursor:pointer; user-select:none;';
        icon.onclick = function() {
            if (input.type === 'password') {
                input.type = 'text';
                icon.textContent = '🙈';
            } else {
                input.type = 'password';
                icon.textContent = '👁️';
            }
        };
        wrapper.appendChild(icon);
    });
})();
</script>
{% endblock %}
