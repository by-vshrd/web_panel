{% extends 'base.html' %}
{% block title %}VPN Сервис{% endblock %}
{% block content %}
<div class="card" style="text-align: center;">
    <h1>Доступ к заблокированным сервисам</h1>
    <p style="color: var(--muted); margin-bottom:0.5rem;">VPN на протоколах VLESS x HYSTERIA. Быстрое подключение в 1 клик</p>

    <div class="status-indicator" id="status-indicator">
        <span id="status-dot" class="status-dot"></span>
        <span id="status-text">Проверка...</span>
    </div>

    <a href="{% url 'signup' %}" class="btn" style="margin-top:0.5rem;">Регистрация</a>
    <p style="margin-top:1rem; font-size:0.85rem;">Уже есть аккаунт? <a href="{% url 'login' %}">Войти</a></p>
</div>

<script>
    async function updateServerStatus() {
        const dot = document.getElementById('status-dot');
        const text = document.getElementById('status-text');
        const indicator = document.getElementById('status-indicator');
        try {
            const response = await fetch('/accounts/server-status/');
            const data = await response.json();
            if (data.online) {
                dot.className = 'status-dot online';
                text.textContent = '🟢 Сервер онлайн';
                indicator.style.borderColor = 'var(--success)';
            } else {
                dot.className = 'status-dot offline';
                text.textContent = '🔴 Сервер офлайн';
                indicator.style.borderColor = 'var(--danger)';
            }
        } catch (e) {
            dot.className = 'status-dot offline';
            text.textContent = '🔴 Сервер офлайн';
            indicator.style.borderColor = 'var(--danger)';
        }
    }
    setInterval(updateServerStatus, 30000);
    updateServerStatus();
</script>
{% endblock %}
